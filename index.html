<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ConfigureOne Cloud Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet" />
    <script crossorigin="anonymous" defer src="https://kit.fontawesome.com/46660cdeff.js"></script>
    <link rel="stylesheet" href="minterface.css" />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/ag-grid-enterprise@35.2.0/dist/ag-grid-enterprise.min.js"></script>
  </head>
  <body class="app compact">

    <nav id="sidenav" class="collapsed">
      <button class="button button-icon" id="nav-toggle">
        <i class="fa-solid fa-angle-right"></i>
      </button>
      <div id="nav-items">
        <button class="button nav-item active"><i class="fa-regular fa-sliders"></i><span>Admin</span></button>
      </div>
    </nav>

    <div id="app-right">

      <aside id="chat-panel" class="panel">
        <div class="panel-header">
          <i class="fa-regular fa-robot"></i>
          <span>Admin Agent</span>
          <button class="button button-icon panel-toggle" id="chat-toggle">
            <i class="fa-solid fa-angle-right"></i>
          </button>
        </div>
        <div class="panel-body">
          <div id="chat-messages"></div>
          <div id="quick-actions">
            <div id="quick-actions-header">
              <span>Quick Actions</span>
              <button class="button button-icon" id="quick-actions-toggle" type="button"><i class="fa-solid fa-angle-up"></i></button>
            </div>
            <div id="quick-actions-content">
              <div class="action-pills">
                <button class="pill" type="button">BOM</button>
                <button class="pill" type="button">Build</button>
                <button class="pill" type="button">Commit</button>
              </div>
            </div>
          </div>
          <div id="chat-footer">
            <label class="button button-icon" id="attach-btn">
              <i class="fa-regular fa-paperclip"></i>
              <input hidden multiple type="file" />
            </label>
            <input id="chat-input" placeholder="Message…" type="text" />
            <button class="button button-icon" id="send-btn">
              <i class="fa-solid fa-paper-plane"></i>
            </button>
          </div>
        </div>
      </aside>

      <div id="main-content">
        <div class="toolbar" id="workspace-bar">
          <b id="workspace-title">Workspace</b>
          <span class="inline-separator">—</span>
          <span id="workspace-status">New session</span>
          <button class="button" id="reset-btn" type="button">
            <i class="fa-regular fa-trash-can"></i>Reset workspace
          </button>
        </div>
        <div class="toolbar" id="workflow-bar"></div>
        <div class="toolbar" id="tab-bar">
          <button class="chip-tab" data-tab="files">Files</button>
          <button class="chip-tab" data-tab="model">Model</button>
          <button class="chip-tab" data-tab="attributes">Attributes</button>
          <button class="chip-tab" data-tab="rules">Rules</button>
          <button class="chip-tab" data-tab="equations">Equations</button>
          <button class="chip-tab" data-tab="results">Results</button>
          <button class="chip-tab" data-tab="preview">Preview</button>
          <button class="chip-tab" data-tab="commit">Commit</button>
        </div>
        <div id="tab-content">
          <div class="tab-pane" id="pane-files">
            <div class="pane-overview">
              <b>Overview</b>
              <div class="overview-stats" id="files-stats">
                <span class="overview-stat"><i class="fa-regular fa-arrow-up-from-bracket"></i>0 uploaded</span>
                <span class="overview-stat"><i class="fa-regular fa-sparkles"></i>0 generated</span>
              </div>
            </div>
            <div class="pane-section">
              <b>Uploaded</b>
              <div class="drop-zone" id="drop-zone">
                <i class="fa-regular fa-cloud-arrow-up"></i>
                <span>Drag and drop files here</span>
                <label class="button outline" id="upload-btn">
                  Upload
                  <input hidden multiple type="file" />
                </label>
              </div>
              <div id="files-uploaded-grid" class="pane-grid"></div>
            </div>
            <div class="pane-section">
              <b>Generated</b>
              <div class="empty-state" id="generated-empty">
                <i class="fa-regular fa-sparkles"></i>
                <span>No files have been generated yet</span>
              </div>
              <div id="files-generated-grid" class="pane-grid"></div>
            </div>
          </div>
          <div class="tab-pane" id="pane-model">
            <div class="pane-overview">
              <b>Overview</b>
              <div class="overview-stats" id="model-stats"></div>
            </div>
          </div>
          <div class="tab-pane" id="pane-attributes">
            <div class="pane-overview"><b>Overview</b></div>
          </div>
          <div class="tab-pane" id="pane-rules">
            <div class="pane-overview"><b>Overview</b></div>
          </div>
          <div class="tab-pane" id="pane-equations">
            <div class="pane-overview"><b>Overview</b></div>
          </div>
          <div class="tab-pane" id="pane-results">
            <div class="pane-overview"><b>Overview</b></div>
          </div>
          <div class="tab-pane" id="pane-preview">
            <div class="pane-overview"><b>Overview</b></div>
          </div>
          <div class="tab-pane" id="pane-commit">
            <div class="pane-overview"><b>Overview</b></div>
          </div>
        </div>
      </div>

      <aside id="detail-panel" class="panel collapsed">
        <div class="panel-header">
          <span>Details</span>
          <button class="button button-icon panel-toggle" id="detail-toggle">
            <i class="fa-solid fa-angle-left"></i>
          </button>
        </div>
        <div class="panel-body" id="detail-content"></div>
      </aside>

    </div>

    <script defer src="scripts.js"></script>
  </body>
</html>
