<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ConfigureOne Cloud Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet" />
    <script crossorigin="anonymous" defer src="https://kit.fontawesome.com/46660cdeff.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-light.min.css" />
    <link rel="stylesheet" href="minterface.css" />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/ag-grid-enterprise@35.2.0/dist/ag-grid-enterprise.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.min.js"></script>
  </head>
  <body class="app compact">

    <nav id="sidenav" class="collapsed">
      <button class="button button-icon" id="nav-toggle">
        <i class="fa-solid fa-angle-right"></i>
      </button>
      <div id="nav-items">
        <button class="button nav-item active"><i class="fa-regular fa-sliders"></i><span>Admin</span></button>
      </div>
    </nav>

    <div id="app-right">

      <aside id="chat-panel" class="panel">
        <div class="panel-header">
          <span class="architect-logo">A</span>
          <span>Architect</span>
          <button class="button button-icon panel-toggle" id="chat-toggle">
            <i class="fa-solid fa-angle-right"></i>
          </button>
        </div>
        <div class="panel-body">
          <div id="chat-messages"></div>
          <div id="chat-status"></div>
          <div id="quick-actions">
            <div id="quick-actions-header">
              <span>Quick Actions</span>
              <button class="button button-icon" id="quick-actions-toggle" type="button"><i class="fa-solid fa-angle-up"></i></button>
            </div>
            <div id="quick-actions-content">
              <div class="action-pills">
                <button class="pill pill-demo" type="button" id="pill-continue">Continue</button>
                <button class="pill" type="button">Update</button>
                <button class="pill" type="button">BOM</button>
                <button class="pill" type="button">Build</button>
                <button class="pill" type="button">Commit</button>
              </div>
            </div>
          </div>
          <div id="chat-footer">
            <label class="button button-icon" id="attach-btn">
              <i class="fa-regular fa-paperclip"></i>
              <input hidden multiple type="file" />
            </label>
            <input id="chat-input" placeholder="Message…" type="text" />
            <button class="button button-icon" id="send-btn">
              <i class="fa-solid fa-paper-plane"></i>
            </button>
          </div>
        </div>
      </aside>

      <div id="main-content">
        <div class="toolbar" id="workspace-bar">
          <b id="workspace-title">Workspace</b>
          <span class="inline-separator">—</span>
          <span id="workspace-status">New session</span>
          <span id="workspace-context">Context 6%</span>
          <button class="button" id="reset-btn" type="button">
            <i class="fa-regular fa-trash-can"></i>Reset workspace
          </button>
        </div>
        <div class="toolbar" id="workflow-bar"></div>
        <div class="toolbar" id="tab-bar">
          <button class="chip-tab" data-tab="overview">Overview</button>
          <button class="chip-tab" data-tab="files">Files</button>
          <button class="chip-tab" data-tab="model">Model</button>
          <button class="chip-tab" data-tab="attributes">Attributes</button>
          <button class="chip-tab" data-tab="rules">Rules</button>
          <button class="chip-tab" data-tab="equations">Equations</button>
          <button class="chip-tab" data-tab="results">Results</button>
          <button class="chip-tab" data-tab="preview">Preview</button>
          <button class="chip-tab" data-tab="commit">Commit</button>
        </div>
        <div id="tab-content">
          <div class="tab-pane" id="pane-overview">
            <div class="pane-section">
              <b>Files</b>
              <div class="overview-stats" id="overview-files-stats"></div>
            </div>
            <div class="pane-section">
              <b>Model</b>
              <div class="overview-stats" id="overview-model-stats"></div>
            </div>
            <div class="pane-section">
              <b>Attributes</b>
              <div class="overview-stats" id="overview-attributes-stats"></div>
            </div>
            <div class="pane-section">
              <b>Rules</b>
              <div class="overview-stats" id="overview-rules-stats"></div>
            </div>
            <div class="pane-section">
              <b>Equations</b>
              <div class="overview-stats" id="overview-equations-stats"></div>
            </div>
            <div class="pane-section">
              <b>Results</b>
              <div class="overview-stats" id="overview-results-stats"></div>
            </div>
          </div>
          <div class="tab-pane" id="pane-files">
            <div id="files-grid" class="pane-grid-full"></div>
          </div>
          <div class="tab-pane" id="pane-model">
            <div class="sub-tabs">
              <button class="sub-tab active" data-subtab="model-tree">Tree</button>
              <button class="sub-tab" data-subtab="model-graph">Graph</button>
              <button class="sub-tab" data-subtab="model-json">Raw JSON</button>
            </div>
            <div class="sub-pane active" id="subpane-model-tree"></div>
            <div class="sub-pane" id="subpane-model-graph"></div>
            <div class="sub-pane" id="subpane-model-json"></div>
          </div>
          <div class="tab-pane" id="pane-attributes"></div>
          <div class="tab-pane" id="pane-rules"></div>
          <div class="tab-pane" id="pane-equations"></div>
          <div class="tab-pane" id="pane-results"></div>
          <div class="tab-pane" id="pane-preview"></div>
          <div class="tab-pane" id="pane-commit"></div>
        </div>
      </div>

    </div>

    <div id="detail-overlay" hidden></div>
    <aside id="detail-panel" class="collapsed">
      <div class="panel-header">
        <span>Details</span>
        <button class="button button-icon" id="detail-toggle">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="panel-body" id="detail-content"></div>
    </aside>

    <script defer src="scripts.js"></script>
  </body>
</html>
